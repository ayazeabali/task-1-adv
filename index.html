<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LMS - Advanced Library System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <main class="main-content">
            <header class="top-nav">
                <div class="brand">
                    <h2>LIBRA<span>NEXT</span></h2>
                </div>

                <div class="controls-wrapper">
                    <div class="search-container">
                        <input type="text" id="searchInput" placeholder="Quick search books...">
                        <select id="categoryFilter">
                            <option value="all">All Genres</option>
                            <option value="Programming">Programming</option>
                            <option value="History">History</option>
                            <option value="Languages">Languages</option>
                        </select>
                    </div>
                    
                    <button id="openModalBtn" class="add-book-trigger">+ Add New Book</button>
                </div>
            </header>

            <section class="grid-wrapper">
                <div id="bookGrid" class="book-grid"></div>
            </section>
        </main>
    </div>

    <div id="formModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>NEW ENTRY</h3>
                <span class="close-btn">&times;</span>
            </div>
            
            <div class="add-book-section">
                <div class="input-group">
                    <label>BOOK TITLE</label>
                    <input type="text" id="newTitle" placeholder="Title...">
                </div>
                <div class="input-group">
                    <label>AUTHOR</label>
                    <input type="text" id="newAuthor" placeholder="Author name...">
                </div>
                <div class="input-group">
                    <label>CATEGORY</label>
                    <select id="newCat">
                        <option value="Programming">Programming</option>
                        <option value="History">History</option>
                        <option value="Languages">Languages</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>LOCATION</label>
                    <input type="text" id="newLoc" placeholder="e.g. Shelf-A1">
                </div>
                <button id="addBtn">ADD TO LIBRARY</button>
            </div>
        </div>
    </div>

    <script type="module" src="dist/app.js"></script>
</body>
</html>
